<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Airline Booking</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f4f6f9;
}

.booking-box{
    max-width:600px;
    margin:50px auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
}
</style>
</head>
<body>

<div class="container">
    <div class="booking-box">
        <h2 class="text-center text-primary mb-4">✈ Flight Booking</h2>

        <form>
            <div class="mb-3">
                <label class="form-label">Passenger Name</label>
                <input type="text" class="form-control" id="name" required>
            </div>

            <div class="mb-3">
                <label class="form-label">From</label>
                <input type="text" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">To</label>
                <input type="text" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Departure Date</label>
                <input type="date" class="form-control">
            </div>

            <button type="button" class="btn btn-primary w-100" onclick="bookFlight()">
                Book Flight
            </button>
        </form>
    </div>
</div>

<script>
function bookFlight() {
    let passengerName = document.getElementById("name").value;

    if(passengerName==""){
        alert("Please enter passenger name");
        return;
    }

    localStorage.setItem("passengerName", passengerName);

    window.location.href="confirm.html";
}
</script>

</body>
</html>
