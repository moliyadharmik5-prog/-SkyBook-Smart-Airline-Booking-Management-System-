<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Booking Confirmation</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f4f6f9;
}

.confirm-box{
    max-width:600px;
    margin:100px auto;
    background:white;
    padding:40px;
    text-align:center;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
}
</style>
</head>
<body>

<div class="confirm-box">
    <h1>✅</h1>

    <h2 class="text-success">Booking Confirmed!</h2>

    <h4 id="passenger"></h4>

    <p>Your flight ticket has been booked successfully.</p>

    <p><strong>Booking ID:</strong> AIR2026001</p>

    <a href="Book.html" class="btn btn-primary">
        Book Another Flight
    </a>
</div>

<script>
let name = localStorage.getItem("passengerName");

document.getElementById("passenger").innerHTML =
"Passenger: <span class='text-primary'>" + name + "</span>";
</script>

</body>
</html>
